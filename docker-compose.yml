version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: webrag-backend
    ports:
      - "8000:8000"
    volumes:
      - webrag-data:/app/data
    env_file:
      - .env
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: webrag-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  webrag-data:
    driver: local
